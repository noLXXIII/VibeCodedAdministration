<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>CPP Admin Dashboard</title>
  <link rel="stylesheet" href="/styles/Stylesheet.css" />
  <link rel="stylesheet" href="/status.css" />
  <link rel="stylesheet" href="/app.css" />
  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <header class="overview-header">
    <div class="overview-header-inner">
      <div>
        <p class="overview-eyebrow">Collaboration &amp; Planning Platform</p>
        <h1 class="overview-title">Admin Dashboard</h1>
      </div>
      <div class="overview-header-actions">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Theme umschalten">
          <span class="theme-toggle-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>
  <main class="overview-main">
    <div id="modules" class="overview-grid"></div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
