<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>CPP Admin Dashboard</title>
  <link rel="stylesheet" href="/styles/Stylesheet.css" />
  <link rel="stylesheet" href="/status.css" />
  <link rel="stylesheet" href="/app.css" />
  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <header class="overview-header">
    <div class="overview-header-inner">
      <div>
        <p class="overview-eyebrow">Collaboration &amp; Planning Platform</p>
        <h1 class="overview-title">Admin Dashboard</h1>
      </div>
      <div class="overview-header-actions">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Theme umschalten">
          <span class="theme-toggle-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>
  <main class="overview-main">
    <div class="admin-toolbar">
      <button id="add-module-btn" class="admin-add-btn" type="button">+ Modul hinzufügen</button>
    </div>
    <div id="modules" class="overview-grid"></div>
  </main>

  <div id="add-module-modal" class="admin-modal-overlay hidden">
    <div class="admin-modal">
      <h2>Neues Modul registrieren</h2>
      <p class="admin-modal-subtitle">Gemäß TEAM-CONVENTIONS.md: Health-Check, API-Doku und ein freier URL-Pfad sind Pflicht.</p>
      <form id="add-module-form">
        <div class="admin-form-grid">
          <div class="admin-form-group span-2">
            <label for="field-name">Modulname</label>
            <input id="field-name" class="input-field" type="text" required placeholder="z. B. Kommunikation" />
          </div>
          <div class="admin-form-group">
            <label for="field-team">Team</label>
            <input id="field-team" class="input-field" type="text" required placeholder="z. B. 1" />
          </div>
          <div class="admin-form-group">
            <label for="field-route">URL-Pfad</label>
            <input id="field-route" class="input-field" type="text" required placeholder="/mein-modul" />
          </div>
          <div class="admin-form-group span-2">
            <p id="route-hint" class="admin-route-hint"></p>
          </div>
          <div class="admin-form-group span-2">
            <label for="field-health">Health-Check-URL</label>
            <input id="field-health" class="input-field" type="text" required placeholder="http://service:port/health" />
          </div>
          <div class="admin-form-group span-2">
            <label for="field-docs">API-Doku-URL</label>
            <input id="field-docs" class="input-field" type="text" required placeholder="http://service:port/openapi.json" />
          </div>
          <div class="admin-form-group span-2">
            <label for="field-admin">Admin-URL <span class="admin-field-optional">(optional)</span></label>
            <input id="field-admin" class="input-field" type="text" placeholder="http://service:port/admin" />
          </div>
          <div class="admin-form-group span-2">
            <label for="field-repo">Git-Repo-URL <span class="admin-field-optional">(optional, für Auto-Deploy)</span></label>
            <input id="field-repo" class="input-field" type="text" placeholder="https://github.com/org/repo.git" />
          </div>
        </div>
        <div class="admin-modal-actions">
          <button id="add-module-cancel" class="btn btn-secondary" type="button">Abbrechen</button>
          <button id="add-module-submit" class="btn" type="submit">Modul anlegen</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
